name: Scrape JobTrain IoM Jobs (Python)

on:
  # Run on schedule (daily at 2 AM UTC)
  schedule:
    - cron: '0 2 * * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: 📦 Install dependencies
        run: pip install requests
        
      - name: 📝 Create scraper script
        run: |
          cat > scraper.py << 'EOF'
          import requests
          import json
          import time
          from datetime import datetime
          import os
          
          BASE_URL = 'https://www.jobtrain.co.uk/iomgovjobs/Home/_JobCard'
          QUERY_PARAMS = {
              'Skip': 0,
              'what': '',
              'Miles': '',
              'Salary': '',
              'LocationId': '',
              'Regions': '',
              'DivisionIds': '',
              'ClientCategory': '',
              'Departments': '',
              'SchoolLocationId': '',
              'JobLevels': '',
              'SchoolSubjectId': '',
              'JobTypeIds': '',
              'lat': '0',
              'long': '0',
              'EmploymentType': '',
              'postedDate': ''
          }
          
          ITEMS_PER_PAGE = 12
          MAX_PAGES = 100
          REQUEST_TIMEOUT = 10
          DELAY_BETWEEN_REQUESTS = 0.5
          
          def fetch_all_jobs():
              """Fetch all job listings from all pages"""
              all_jobs = []
              skip_value = 0
              page_count = 0
              has_more_jobs = True
          
              print('🚀 Starting to scrape jobs from JobTrain IoM...\n')
          
              while has_more_jobs and page_count < MAX_PAGES:
                  page_count += 1
                  query_params = QUERY_PARAMS.copy()
                  query_params['Skip'] = skip_value
          
                  try:
                      print(f'📄 Fetching page {page_count} (Skip={skip_value})...')
                      response = requests.get(BASE_URL, params=query_params, timeout=REQUEST_TIMEOUT)
                      response.raise_for_status()
          
                      jobs = response.json()
          
                      if not isinstance(jobs, list) or len(jobs) == 0:
                          print(f'✅ No more jobs found. Total pages: {page_count - 1}')
                          has_more_jobs = False
                          break
          
                      print(f'   ✓ Found {len(jobs)} jobs on this page')
                      all_jobs.extend(jobs)
          
                      if len(jobs) < ITEMS_PER_PAGE:
                          print(f'✅ Last page reached ({len(jobs)} jobs < {ITEMS_PER_PAGE})')
                          has_more_jobs = False
          
                      skip_value += ITEMS_PER_PAGE
                      time.sleep(DELAY_BETWEEN_REQUESTS)
          
                  except requests.exceptions.RequestException as e:
                      print(f'❌ Error fetching page {page_count}: {str(e)}')
                      break
          
              return all_jobs
          
          def main():
              """Main function"""
              try:
                  jobs = fetch_all_jobs()
          
                  output = {
                      'metadata': {
                          'totalJobs': len(jobs),
                          'scrapedAt': datetime.now().isoformat(),
                          'source': 'https://www.jobtrain.co.uk/iomgovjobs/',
                          'description': 'All job listings from JobTrain Isle of Man Government Jobs'
                      },
                      'jobs': jobs
                  }
          
                  # Create data directory
                  os.makedirs('data', exist_ok=True)
          
                  output_path = 'data/all_jobs.json'
                  with open(output_path, 'w', encoding='utf-8') as f:
                      json.dump(output, f, indent=2, ensure_ascii=False)
          
                  file_size_kb = os.path.getsize(output_path) / 1024
          
                  print(f'\n✨ Success!')
                  print(f'📊 Total jobs scraped: {len(jobs)}')
                  print(f'📁 Saved to: {output_path}')
                  print(f'📦 File size: {file_size_kb:.2f} KB')
                  
                  # Write summary
                  with open('job-summary.json', 'w') as f:
                      json.dump({
                          'totalJobs': len(jobs),
                          'timestamp': datetime.now().isoformat()
                      }, f)
          
              except Exception as e:
                  print(f'Fatal error: {str(e)}')
                  exit(1)
          
          if __name__ == '__main__':
              main()
          EOF
        
      - name: 🎯 Run scraper
        run: python scraper.py
        
      - name: 📊 Display results
        run: |
          echo "=== Job Scraping Results ===" 
          cat job-summary.json
          
      - name: 📝 Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add data/all_jobs.json
            git commit -m "chore: update job listings - $(date +'%Y-%m-%d %H:%M:%S UTC')" || true
            git push || echo "Nothing to push"
          fi
          
      - name: ✅ Workflow complete
        run: echo "Jobs scraped and saved successfully at $(date)"
